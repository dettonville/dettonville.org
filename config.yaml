baseURL: "https://dettonville.org/"
## while testing use the following
#baseURL: "https://lj020326.github.io/dettonville.org/"

title: "Dettonville"
theme: "PaperMod"

# This will generate an index.xml (RSS)
outputs:
  home: ["HTML", "RSS"]

ignoreFiles:
  - archive/
  - save/

params:
  env: production
  # PaperMod supports dark/light toggle
  defaultTheme: light
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true

  mainSections:
    - framework
    - site-management
    - ecosystem
    - ansible

  # Add these social parameters
  socialIcons:
    - name: "github"
      url: "https://github.com/dettonville"
    - name: "linkedin"
      url: "https://www.linkedin.com/in/leejjohnson/"
    - name: "x"
      url: "https://x.com/lj020326"
    - name: "discussions"
      url: "https://github.com/orgs/dettonville/discussions"

  # PaperMod expects the path relative to the static folder for favicons
  favicon: "favicon.ico"
  favicon16x16: "favicon-16x16.ico"

  # Enabling the asset pipeline for fingerprinting/caching
  assets:
    # Enables the caching
    disableFingerprinting: false

  homeInfoParams:
    Title: "Dettonville Infrastructure Project"
    Content: "Advanced Automation Engineering & System Hardening Framework."

menu:
  main:
    - name: "Framework"
      url: "framework/"
      weight: 10
    - name: "Site Management"
      url: "site-management/"
      weight: 20
    - name: "Ecosytem"
      url: "ecosystem/"
      weight: 30
    - name: "Ansible"
      url: "ansible/"
      weight: 40
