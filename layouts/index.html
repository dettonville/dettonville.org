{{ define "main" }}
<div class="dettonville-home-container">
    <div class="home-hero">
        <div class="hero-content">
            <div class="hero-logo-container">
                <img src="{{ "logo.png" | relURL }}" alt="{{ .Title }}">
            </div>
            <p class="hero-subtitle">{{ .Params.description }}</p>
            <div class="hero-buttons">
                <a class="btn-primary" href="{{ "framework/" | relURL }}">Explore Framework</a>
                <a class="btn-secondary" href="{{ "ansible/" | relURL }}">Browse Ansible Content</a>
            </div>
        </div>
    </div>

    <div class="main-markdown-body">
        {{ .Content }}
    </div>

    <hr class="section-divider"/>

    {{ if .Params.features }}
    <div class="features-grid">
        {{ range .Params.features }}
        <div class="feature-item">
            <h3>{{ .title }}</h3>
            <p>{{ .description }}</p>
        </div>
        {{ end }}
    </div>
    {{ end }}
</div>
{{ end }}
